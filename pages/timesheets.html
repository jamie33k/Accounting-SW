<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timesheets - AccuFlow</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-calculator"></i>
                <span>AccuFlow</span>
            </div>
            
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="employees.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Employees</span>
                </a>
                <a href="timesheets.html" class="nav-item active">
                    <i class="fas fa-clock"></i>
                    <span>Timesheets</span>
                </a>
                <a href="jobs.html" class="nav-item">
                    <i class="fas fa-briefcase"></i>
                    <span>Jobs</span>
                </a>
                <a href="invoices.html" class="nav-item">
                    <i class="fas fa-file-invoice"></i>
                    <span>Invoices</span>
                </a>
                <a href="vendors.html" class="nav-item">
                    <i class="fas fa-truck"></i>
                    <span>Vendors</span>
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Loading...</span>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Timesheets</h1>
                <button class="btn-primary" onclick="openAddTimesheetModal()">
                    <i class="fas fa-plus"></i> Add Timesheet
                </button>
            </header>
            
            <!-- Filters -->
            <div class="filters-bar">
                <div class="date-range">
                    <input type="date" id="startDate" onchange="filterTimesheets()">
                    <span>to</span>
                    <input type="date" id="endDate" onchange="filterTimesheets()">
                </div>
                <div class="filter-options">
                    <select id="employeeFilter" onchange="filterTimesheets()">
                        <option value="">All Employees</option>
                    </select>
                    <select id="jobFilter" onchange="filterTimesheets()">
                        <option value="">All Jobs</option>
                    </select>
                </div>
            </div>
            
            <!-- Timesheets Table -->
            <div class="table-container">
                <table class="data-table" id="timesheetsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Employee</th>
                            <th>Job</th>
                            <th>Week Ending</th>
                            <th>Hours</th>
                            <th>Overtime</th>
                            <th>Total Pay</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="timesheetsTableBody">
                        <tr>
                            <td colspan="8" class="text-center">Loading timesheets...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <!-- Add/Edit Timesheet Modal -->
    <div id="timesheetModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Timesheet</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="timesheetForm" onsubmit="saveTimesheet(event)">
                <input type="hidden" id="timesheetId">
                
                <div class="form-group">
                    <label for="employeeId">Employee *</label>
                    <select id="employeeId" required>
                        <option value="">Select Employee</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="jobId">Job *</label>
                    <select id="jobId" required>
                        <option value="">Select Job</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="weekEnding">Week Ending *</label>
                    <input type="date" id="weekEnding" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="hoursWorked">Hours Worked *</label>
                        <input type="number" id="hoursWorked" step="0.5" min="0" max="168" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="overtimeHours">Overtime Hours</label>
                        <input type="number" id="overtimeHours" step="0.5" min="0" value="0">
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
                <span class="close" onclick="closeDeleteModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this timesheet?</p>
                <p class="warning">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button type="button" class="btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
    
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/timesheets.js"></script>
</body>
</html>
