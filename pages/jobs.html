<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - AccuFlow</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-body {
            /* New background image */
            background: url('https://cdn.corporatefinanceinstitute.com/assets/financial-accounting.jpeg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* Dark overlay for text readability */
        .auth-body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
            pointer-events: none;
        }

        /* Ensure content is above overlay */
        .auth-container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            width: 100%;
        }

        /* Make the login card transparent with blur effect */
        .auth-card {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2) !important;
        }

        /* Style the "Back to Home" link */
        .back-home {
            background: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(5px) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.3) !important;
            transform: translateY(-2px);
        }

        .back-home i {
            font-size: 14px;
        }

        /* Style form inputs */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: white !important;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
        }

        .form-group label i {
            color: white !important;
            margin-right: 8px;
            width: 16px;
        }

        .form-group input {
            background: rgba(255, 255, 255, 0.9) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            transition: all 0.3s ease;
            color: #333;
            width: 100%;
            box-sizing: border-box;
        }

        .form-group input:focus {
            background: white !important;
            border-color: #667eea !important;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2) !important;
            outline: none;
        }

        .form-group input::placeholder {
            color: #999;
        }

        /* Style the submit button */
        .btn-primary {
            background: #667eea !important;
            border: none !important;
            padding: 16px !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            border-radius: 12px !important;
            color: white !important;
            cursor: pointer;
            transition: all 0.3s ease !important;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #5a67d8 !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3) !important;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Style the footer text */
        .auth-footer {
            color: rgba(255, 255, 255, 0.9) !important;
            border-top: 2px solid rgba(255, 255, 255, 0.2) !important;
            margin-top: 25px;
            padding-top: 25px;
            text-align: center;
        }

        .auth-footer a {
            color: white !important;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Style header text */
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header .logo {
            color: white !important;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            display: inline-block;
        }

        .auth-header h2 {
            color: white !important;
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.9) !important;
            font-size: 16px;
        }

        /* Alert messages */
        .alert {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(5px) !important;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .alert-error {
            background: rgba(248, 215, 218, 0.9) !important;
            color: #721c24 !important;
            border: 1px solid rgba(245, 198, 203, 0.3) !important;
        }

        .alert-success {
            background: rgba(212, 237, 218, 0.9) !important;
            color: #155724 !important;
            border: 1px solid rgba(195, 230, 203, 0.3) !important;
        }

        .alert i {
            font-size: 18px;
        }

        /* Remember me checkbox */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            cursor: pointer;
        }

        .checkbox input {
            width: auto;
            accent-color: #667eea;
        }

        .forgot-link {
            color: white !important;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            .auth-header h2 {
                font-size: 24px;
            }

            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <a href="../index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo" onclick="window.location.href='../index.html'">AccuFlow</div>
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-link" onclick="alert('Please contact admin@accuflow.com to reset your password.')">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-primary" id="loginButton">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const button = document.getElementById('loginButton');
            
            // Demo credentials for testing
            const DEMO_EMAIL = 'admin@demo.com';
            const DEMO_PASSWORD = 'password';
            
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            
            try {
                // Simulate API call for demo
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                if (email === DEMO_EMAIL && password === DEMO_PASSWORD) {
                    localStorage.setItem('user', JSON.stringify({ 
                        email: email, 
                        fullName: 'Admin User',
                        role: 'admin' 
                    }));
                    
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    throw new Error('Invalid email or password');
                }
            } catch (error) {
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                showAlert(error.message, 'error');
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        // Pre-fill remembered email
        const rememberedEmail = localStorage.getItem('remember_email');
        if (rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('remember').checked = true;
        }
    </script>
</body>
</html>
