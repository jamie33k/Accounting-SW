<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AccuFlow</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-body {
            /* New background image */
            background: url('https://cdn.corporatefinanceinstitute.com/assets/financial-accounting.jpeg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* Dark overlay for text readability */
        .auth-body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
            pointer-events: none;
        }

        /* Ensure content is above overlay */
        .auth-container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
        }

        /* Make the register card transparent with blur effect */
        .auth-card {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2) !important;
        }

        /* Style the "Back to Home" link */
        .back-home {
            background: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(5px) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.3) !important;
            transform: translateY(-2px);
        }

        .back-home i {
            font-size: 14px;
        }

        /* Style form inputs */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: white !important;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
        }

        .form-group label i {
            color: white !important;
            margin-right: 8px;
            width: 16px;
        }

        .form-group input, .form-group select {
            background: rgba(255, 255, 255, 0.9) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            transition: all 0.3s ease;
            color: #333;
            width: 100%;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group select:focus {
            background: white !important;
            border-color: #667eea !important;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2) !important;
            outline: none;
        }

        .form-group input::placeholder {
            color: #999;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Phone input styling */
        .phone-input {
            display: flex;
            gap: 10px;
        }

        .country-code {
            width: 100px;
            background: rgba(255, 255, 255, 0.9) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            color: #333;
        }

        /* Password requirements */
        .password-requirements {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .requirement {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .requirement i {
            width: 16px;
        }

        .requirement.valid {
            color: #4caf50;
        }

        .requirement.valid i {
            color: #4caf50;
        }

        .requirement.invalid {
            color: #f44336;
        }

        .requirement.invalid i {
            color: #f44336;
        }

        /* Style the submit button */
        .btn-primary {
            background: #667eea !important;
            border: none !important;
            padding: 16px !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            border-radius: 12px !important;
            color: white !important;
            cursor: pointer;
            transition: all 0.3s ease !important;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .btn-primary:hover {
            background: #5a67d8 !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3) !important;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Style the footer text */
        .auth-footer {
            color: rgba(255, 255, 255, 0.9) !important;
            border-top: 2px solid rgba(255, 255, 255, 0.2) !important;
            margin-top: 25px;
            padding-top: 25px;
            text-align: center;
        }

        .auth-footer a {
            color: white !important;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Style header text */
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header .logo {
            color: white !important;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            display: inline-block;
        }

        .auth-header h2 {
            color: white !important;
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.9) !important;
            font-size: 16px;
        }

        /* Alert messages */
        .alert {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(5px) !important;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .alert-error {
            background: rgba(248, 215, 218, 0.9) !important;
            color: #721c24 !important;
            border: 1px solid rgba(245, 198, 203, 0.3) !important;
        }

        .alert-success {
            background: rgba(212, 237, 218, 0.9) !important;
            color: #155724 !important;
            border: 1px solid rgba(195, 230, 203, 0.3) !important;
        }

        .alert i {
            font-size: 18px;
        }

        /* Terms checkbox */
        .terms-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            margin: 20px 0;
            cursor: pointer;
        }

        .terms-checkbox input {
            width: auto;
            accent-color: #667eea;
        }

        .terms-checkbox a {
            color: white;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            .auth-header h2 {
                font-size: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .phone-input {
                flex-direction: column;
            }

            .country-code {
                width: 100%;
            }
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <a href="../index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo" onclick="window.location.href='../index.html'">AccuFlow</div>
                <h2>Create Account</h2>
                <p>Join thousands of businesses using AccuFlow</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="registerForm">
                <!-- Full Name -->
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
                
                <!-- Email -->
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address *</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <!-- Phone Number -->
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number *</label>
                    <div class="phone-input">
                        <select class="country-code" id="countryCode">
                            <option value="+1">+1 (US)</option>
                            <option value="+44">+44 (UK)</option>
                            <option value="+254" selected>+254 (KE)</option>
                            <option value="+256">+256 (UG)</option>
                            <option value="+255">+255 (TZ)</option>
                            <option value="+250">+250 (RW)</option>
                        </select>
                        <input type="tel" id="phone" placeholder="712345678" pattern="[0-9]{9}" maxlength="9" required onkeypress="return onlyNumbers(event)">
                    </div>
                    <small style="color: rgba(255,255,255,0.7); margin-top: 5px; display: block;">Enter 9 digits only</small>
                </div>
                
                <!-- Password -->
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password *</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                
                <!-- Confirm Password -->
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                
                <!-- Password Requirements -->
                <div class="password-requirements" id="passwordRequirements">
                    <div class="requirement" id="lengthReq">
                        <i class="fas fa-circle"></i> At least 8 characters
                    </div>
                    <div class="requirement" id="uppercaseReq">
                        <i class="fas fa-circle"></i> At least one uppercase letter
                    </div>
                    <div class="requirement" id="lowercaseReq">
                        <i class="fas fa-circle"></i> At least one lowercase letter
                    </div>
                    <div class="requirement" id="numberReq">
                        <i class="fas fa-circle"></i> At least one number
                    </div>
                    <div class="requirement" id="matchReq">
                        <i class="fas fa-circle"></i> Passwords match
                    </div>
                </div>
                
                <!-- Terms and Conditions -->
                <label class="terms-checkbox">
                    <input type="checkbox" id="terms" required>
                    <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                </label>
                
                <button type="submit" class="btn-primary" id="registerButton">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        // Allow only numbers in phone field
        function onlyNumbers(event) {
            var charCode = (event.which) ? event.which : event.keyCode;
            if (charCode > 31 && (charCode < 48 || charCode > 57)) {
                return false;
            }
            return true;
        }

        // Password validation
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        
        function validatePassword() {
            const value = password.value;
            
            // Length check
            const lengthReq = document.getElementById('lengthReq');
            if (value.length >= 8) {
                lengthReq.className = 'requirement valid';
                lengthReq.innerHTML = '<i class="fas fa-check-circle"></i> At least 8 characters';
            } else {
                lengthReq.className = 'requirement invalid';
                lengthReq.innerHTML = '<i class="fas fa-times-circle"></i> At least 8 characters';
            }
            
            // Uppercase check
            const uppercaseReq = document.getElementById('uppercaseReq');
            if (/[A-Z]/.test(value)) {
                uppercaseReq.className = 'requirement valid';
                uppercaseReq.innerHTML = '<i class="fas fa-check-circle"></i> At least one uppercase letter';
            } else {
                uppercaseReq.className = 'requirement invalid';
                uppercaseReq.innerHTML = '<i class="fas fa-times-circle"></i> At least one uppercase letter';
            }
            
            // Lowercase check
            const lowercaseReq = document.getElementById('lowercaseReq');
            if (/[a-z]/.test(value)) {
                lowercaseReq.className = 'requirement valid';
                lowercaseReq.innerHTML = '<i class="fas fa-check-circle"></i> At least one lowercase letter';
            } else {
                lowercaseReq.className = 'requirement invalid';
                lowercaseReq.innerHTML = '<i class="fas fa-times-circle"></i> At least one lowercase letter';
            }
            
            // Number check
            const numberReq = document.getElementById('numberReq');
            if (/[0-9]/.test(value)) {
                numberReq.className = 'requirement valid';
                numberReq.innerHTML = '<i class="fas fa-check-circle"></i> At least one number';
            } else {
                numberReq.className = 'requirement invalid';
                numberReq.innerHTML = '<i class="fas fa-times-circle"></i> At least one number';
            }
            
            // Match check
            const matchReq = document.getElementById('matchReq');
            if (value && value === confirmPassword.value) {
                matchReq.className = 'requirement valid';
                matchReq.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
            } else {
                matchReq.className = 'requirement invalid';
                matchReq.innerHTML = '<i class="fas fa-times-circle"></i> Passwords match';
            }
        }
        
        password.addEventListener('input', validatePassword);
        confirmPassword.addEventListener('input', validatePassword);

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const countryCode = document.getElementById('countryCode').value;
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            
            const button = document.getElementById('registerButton');
            
            // Validation
            if (!fullName || !email || !phone || !password) {
                showAlert('Please fill in all required fields', 'error');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address', 'error');
                return;
            }
            
            if (!/^\d{9}$/.test(phone)) {
                showAlert('Phone number must be exactly 9 digits', 'error');
                return;
            }
            
            if (password.length < 8) {
                showAlert('Password must be at least 8 characters', 'error');
                return;
            }
            
            if (!/[A-Z]/.test(password)) {
                showAlert('Password must contain at least one uppercase letter', 'error');
                return;
            }
            
            if (!/[a-z]/.test(password)) {
                showAlert('Password must contain at least one lowercase letter', 'error');
                return;
            }
            
            if (!/[0-9]/.test(password)) {
                showAlert('Password must contain at least one number', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            if (!terms) {
                showAlert('Please agree to the Terms of Service', 'error');
                return;
            }
            
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            
            try {
                // Simulate API call for demo
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                showAlert('Account created successfully! Redirecting to login...', 'success');
                
                document.getElementById('registerForm').reset();
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                showAlert(error.message, 'error');
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }
    </script>
</body>
</html>
